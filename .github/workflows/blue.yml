name: blue
on:
  pull_request:
    paths:
      - .github/**
      - blue/**
  push:
    paths:
      - .github/**
      - blue/**
jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/plan
        with:
          name: blue
          token: ${{ secrets.TF_API_TOKEN }}
